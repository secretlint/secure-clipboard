name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Download secretlint binary
        run: bash scripts/download-secretlint.sh 11.7.1
      - name: Build
        run: swift build --disable-sandbox
      - name: Test
        run: swift test --disable-sandbox
